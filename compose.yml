services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      - PLUM_ADDR=${PLUM_ADDR:-:8080}
      - PLUM_DATABASE_URL=/data/plum.db
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TVDB_API_KEY=${TVDB_API_KEY}
      - OMDB_API_KEY=${OMDB_API_KEY}
      - GOMODCACHE=/go/pkg/mod
      - GOCACHE=/go-cache
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - .:/app
      - plum_data:/data
      - go_modules:/go/pkg/mod
      - go_cache:/go-cache
      # Override these host paths via env to point at your media library roots.
      - ${PLUM_MEDIA_TV_PATH:-./mordor/media/tv}:/tv:ro
      - ${PLUM_MEDIA_MOVIES_PATH:-./mordor/media/movies}:/movies:ro
      - ${PLUM_MEDIA_ANIME_PATH:-./mordor/media/anime-series}:/anime:ro
      - ${PLUM_MEDIA_MUSIC_PATH:-./mordor/media/music}:/music:ro
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_BACKEND_URL=${VITE_BROWSER_BACKEND_URL:-}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://app:8080}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      app:
        condition: service_healthy

volumes:
  plum_data:
  go_modules:
  go_cache:
